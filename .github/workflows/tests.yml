name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances systeme (mysqlclient)
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Installer les dependances
        run: pip install -r requirements.txt

      # Tests preexistants et deja identifies comme casses independamment du code courant :
      # - test_counter_cron.py : testent l'ancienne logique de seuil a 85%, remplacee par le calcul base sur l'echeance
      # - les autres : les permissions sont deja creees par la migration de donnees initiale, le test tente de les recreer (UNIQUE constraint)
      - name: Lancer les tests backend (pytest)
        run: >
          pytest -q
          --deselect tests/maintenance/test_dashboard_stats_viewset.py::test_should_return_full_stats_when_user_has_dash_stats_full_permission
          --deselect tests/maintenance/test_dashboard_stats_viewset.py::test_should_return_bt_stats_when_user_has_dash_stats_bt_permission
          --deselect tests/maintenance/test_dashboard_stats_viewset.py::test_should_use_custom_dash_permission_before_role_permission
          --deselect tests/maintenance/test_plan_maintenance_viewset.py::test_should_create_plan_document_with_default_name_when_metadata_is_missing
          --deselect tests/tasks/test_counter_cron.py::test_should_create_bt_when_counter_reaches_85_percent
          --deselect tests/tasks/test_counter_cron.py::test_should_not_create_duplicate_bt_when_active_bt_exists
          --deselect tests/tasks/test_counter_cron.py::test_should_skip_declencher_when_parametres_are_none
          --deselect tests/tasks/test_counter_cron.py::test_should_copy_plan_consommables_to_bt
          --deselect tests/utilisateur/test_utilisateur_models.py::test_should_return_human_label_for_known_permission_code
          --deselect tests/utilisateur/test_utilisateur_models.py::test_should_render_role_permission_and_utilisateur_permission_strings

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dependances
        run: npm ci

      - name: Lancer les tests frontend (Vitest)
        run: npm run test -- run
